{% extends "base_auth.html" %} {% block auth_body %}
<div class="self-center bg-slate-200 rounded-2xl p-3.5">
  <svg
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    class="size-10"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 3.75 9.375v-4.5ZM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 0 1-1.125-1.125v-4.5ZM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0 1 13.5 9.375v-4.5Z"
    />
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      d="M6.75 6.75h.75v.75h-.75v-.75ZM6.75 16.5h.75v.75h-.75v-.75ZM16.5 6.75h.75v.75h-.75v-.75ZM13.5 13.5h.75v.75h-.75v-.75ZM13.5 19.5h.75v.75h-.75v-.75ZM19.5 13.5h.75v.75h-.75v-.75ZM19.5 19.5h.75v.75h-.75v-.75ZM16.5 16.5h.75v.75h-.75v-.75Z"
    />
  </svg>
</div>
<div>
  <h2 class="text-center text-2xl font-bold">2段階認証 設定</h2>
  <p class="text-center mt-1">
    QRコードを読み取り、表示された6桁の認証コードを入力してください。
  </p>
</div>
<img
  src="data:image/png;base64,{{ qrcode }}"
  class="w-48 self-center border-2 border-slate-600 rounded-lg"
/>
<div>
  <label for="password" class="block font-semibold text-slate-600"
    >認証コード</label
  >
  <input
    type="text"
    id="two-factor-code"
    class="p-2 text-center w-full border-2 rounded-lg border-slate-400 focus:border-slate-500 focus:ring-slate-300 focus:outline-none focus:ring-3"
    placeholder="123-456"
  />
</div>
<div>
  <button
    class="bg-slate-700 text-slate-100 w-full rounded-lg p-3 hover:bg-slate-800 cursor-pointer"
    id="two-factor-button"
  >
    <div class="flex justify-center gap-2">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z"
        />
      </svg>
      <p>認証</p>
    </div>
  </button>
  <div class="min-h-7 mt-2">
    <p class="text-center text-sm hidden text-red-500" id="fail-message"></p>
  </div>
</div>

<script>
  $(document).ready(() => {
    $("#two-factor-button").on("click", () => {
      const twoFactorCode = $("#two-factor-code").val();
      $.ajax({
        url: "{% url 'verify_two_factor_code' %}",
        method: "POST",
        data: { twoFactorCode: twoFactorCode },
      }).done((response) => {
        if (response.status === "success") {
          location.href = response.redirect_url;
        } else if (response.status === "fail") {
          $("#fail-message").text(response.message);
          $("#fail-message").fadeIn(100);
          $("#two-factor-code")
            .val("")
            .removeClass(
              "border-slate-400 focus:border-slate-500 focus:ring-slate-300",
            )
            .addClass("border-red-400 focus:border-red-500 focus:ring-red-300");
        }
      });
    });
  });
</script>
{% endblock %}
