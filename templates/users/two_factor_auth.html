<div class="self-center bg-slate-200 rounded-2xl p-3.5">

    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    class="size-10"

      stroke-linejoin="round"

        viewBox="0 0 24 24"
